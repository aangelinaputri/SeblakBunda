[phases.setup]
nixPkgs = ["php82", "composer", "nodejs"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan db:seed --class=OrderSeeder --force && php artisan db:seed --class=PengeluaranSeeder --force && php artisan serve --host=0.0.0.0 --port=$PORT"